services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: xinnghiphep-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
      MSSQL_SA_PASSWORD: "${DB_PASSWORD:-YourStrong!Passw0rd}"
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "(/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P $$MSSQL_SA_PASSWORD -Q 'SELECT 1' || /opt/mssql-tools/bin/sqlcmd -C -S localhost -U sa -P $$MSSQL_SA_PASSWORD -Q 'SELECT 1') || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xinnghiphep-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: "1433"
      DB_NAME: XinNghiPhep
      DB_USER: sa
      DB_PASSWORD: "${DB_PASSWORD:-YourStrong!Passw0rd}"
    ports:
      - "8080:8080"

volumes:
  mssql_data:
